version: "3.8"
services:
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: Shrikant
      MONGO_INITDB_ROOT_PASSWORD: Ajit123

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: Shrikant
      ME_CONFIG_MONGODB_ADMINPASSWORD: Ajit123    
      ME_CONFIG_MONGODB_URL: mongodb://Shrikant:Ajit123@mongo:27017/